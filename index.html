<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>الكبائن الفضية | Silver Cabin — SMOU GROUP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#03060d;
      --bg2:#081527;
      --sky:#8fd6ff;
      --sky-light:#d7f1ff;
      --sky-deep:#3d8fd0;
      --ivory:#ffffff;
      --text:#eef6ff;
      --muted:rgba(238,246,255,.68);
      --border:rgba(143,214,255,.22);
      --shadow2:0 18px 45px rgba(0,0,10,.40);
      --shadowStrong:0 30px 80px rgba(0,0,10,.55);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Tajawal", system-ui, -apple-system, "Noto Kufi Arabic", "Noto Sans Arabic", sans-serif;
      background:linear-gradient(180deg,#03060d,#081527 55%,#050d1a);
      color: var(--text);
      overflow-x:hidden;
      position:relative;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      width:34vw;
      height:34vw;
      border-radius:50%;
      filter:blur(110px);
      opacity:.16;
      pointer-events:none;
      z-index:0;
      animation:blobFloat 12s ease-in-out infinite;
    }
    body::before{ top:-8vw; right:-6vw; background:radial-gradient(circle, rgba(143,214,255,.9), transparent 64%); }
    body::after{ left:-8vw; bottom:-10vw; background:radial-gradient(circle, rgba(255,255,255,.3), transparent 60%); animation-delay:-5s; }
    @keyframes blobFloat{ 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-16px) scale(1.06)} }

    .hero{
      position:relative;
      color:#fff;
      padding: 22px 0 30px;
      min-height: 52vh;
      display:flex;
      align-items:stretch;
      overflow:hidden;
      background:
        url("back.webp") center/cover no-repeat,
        url("back.jpg")  center/cover no-repeat,
        url("back.png")  center/cover no-repeat,
        linear-gradient(180deg, var(--bg1), var(--bg2));
      z-index:1;
    }

    .hero::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(900px 360px at 20% 0%, rgba(143,214,255,.18), transparent 60%),
        radial-gradient(800px 320px at 80% 20%, rgba(143,214,255,.12), transparent 60%),
        linear-gradient(180deg, rgba(3,6,13,.62), rgba(5,10,20,.82));
      pointer-events:none;
    }

    .container{
      position:relative;
      z-index:2;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 16px;
      width:100%;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    /* ===== Back Button (Glass Arrow) ===== */
    .backBtn{
      position:absolute;
      bottom:18px;
      right:18px;
      width:46px;
      height:46px;
      border-radius:16px;
      border:1px solid var(--border);
      background:linear-gradient(160deg, rgba(255,255,255,.09), rgba(255,255,255,.02));
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 12px 30px rgba(0,0,10,.4);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:transform .25s ease, background .25s ease, box-shadow .25s ease, border-color .25s ease;
      z-index:9999;
    }
    .backBtn:hover{
      background:linear-gradient(160deg, rgba(255,255,255,.14), rgba(143,214,255,.06));
      border-color:rgba(143,214,255,.55);
      transform:translateY(-4px);
      box-shadow:0 20px 44px rgba(0,0,10,.5), 0 0 26px rgba(143,214,255,.18);
    }
    .backBtn svg{width:18px;height:18px}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 280px;
    }

    .brand .logo{
      width:52px;height:52px;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,.1), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      box-shadow: 0 12px 22px rgba(0,0,10,.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .brand .logo img{
      width: 82%;
      height: 82%;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(0,0,10,.4));
    }

    .brand .text{
      display:flex;
      flex-direction:column;
      line-height:1.2;
    }
    .brand .text .title{
      font-weight: 800;
      font-size: 18px;
      letter-spacing: .2px;
      background:linear-gradient(90deg,#ffffff 0%, #d7f1ff 50%, #8fd6ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .brand .text .sub{
      font-size: 12px;
      color: var(--muted);
      letter-spacing:1px;
    }

    .pill{
      margin-inline-start:auto;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .search{
      width: min(380px, 92vw);
      position:relative;
    }
    .search input{
      width:100%;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color:#fff;
      font-family:inherit;
      outline:none;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color .25s ease, box-shadow .25s ease;
    }
    .search input:focus{
      border-color: rgba(143,214,255,.55);
      box-shadow: 0 0 0 3px rgba(143,214,255,.12);
    }
    .search input::placeholder{color: rgba(238,246,255,.55)}

    .badge{
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      font-weight: 800;
      font-size: 12px;
      color: var(--sky-light);
      white-space:nowrap;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .heroBody{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-top:auto;
      padding-bottom: 8px;
    }

    .heroBody h1{
      margin:0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: .3px;
      background:linear-gradient(90deg,#ffffff 0%,#d7f1ff 35%,#8fd6ff 65%,#ffffff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .heroBody p{
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 760px;
      line-height: 1.8;
    }

    main{
      position:relative;
      z-index:2;
      max-width: 1280px;
      margin: 18px auto 36px;
      padding: 0 16px;
    }

    .sliderHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin: 18px 0 14px;
    }
    .sliderHeader .h{
      position:relative;
      font-weight: 800;
      color: var(--ivory);
      font-size: 18px;
      padding-inline-start:16px;
    }
    .sliderHeader .h::before{
      content:"";
      position:absolute;
      inset-inline-start:0;
      top:50%;
      transform:translateY(-50%);
      width:5px;
      height:20px;
      border-radius:999px;
      background:linear-gradient(180deg,var(--sky-light),var(--sky-deep));
      box-shadow:0 0 14px rgba(143,214,255,.5);
    }
    .controls{display:flex;gap:10px;align-items:center;}
    .btn{
      border:1px solid var(--border);
      cursor:pointer;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 800;
      font-family:inherit;
      background: linear-gradient(160deg, rgba(255,255,255,.09), rgba(255,255,255,.02));
      color: var(--ivory);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow2);
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }
    .btn:hover{
      transform: translateY(-2px);
      border-color: rgba(143,214,255,.55);
      background: linear-gradient(160deg, rgba(255,255,255,.14), rgba(143,214,255,.06));
    }
    .btn.secondary{
      background: rgba(255,255,255,.04);
      color: var(--sky-light);
      box-shadow:none;
    }

    .trackWrap{
      position:relative;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
      padding: 16px;
      border: 1px solid var(--border);
      backdrop-filter: blur(20px) saturate(1.1);
      -webkit-backdrop-filter: blur(20px) saturate(1.1);
      box-shadow: var(--shadowStrong);
      overflow:hidden;
    }

    .track{
      display:flex;
      gap: 16px;
      overflow:auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .track::-webkit-scrollbar{ height: 8px; }
    .track::-webkit-scrollbar-thumb{
      background: rgba(143,214,255,.35);
      border-radius: 999px;
    }
    .track::-webkit-scrollbar-track{
      background: rgba(255,255,255,.04);
      border-radius: 999px;
    }

    .card{
      flex: 0 0 auto;
      width: 240px;
      background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius: 18px;
      overflow:hidden;
      box-shadow: 0 14px 30px rgba(0,0,10,.35);
      scroll-snap-align: start;
      cursor:pointer;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      border: 1px solid var(--border);
    }
    .card:hover{
      transform: translateY(-6px);
      border-color: rgba(143,214,255,.55);
      box-shadow: 0 26px 48px rgba(0,0,10,.5), 0 0 26px rgba(143,214,255,.14);
    }

    .thumb{
      position:relative;
      aspect-ratio: 3/4;
      background: rgba(255,255,255,.04);
      overflow:hidden;
    }
    .thumb img{
      width:100%; height:100%;
      object-fit: cover;
      display:block;
      transform: scale(1.02);
      transition: transform .3s ease;
    }
    .card:hover .thumb img{ transform: scale(1.07); }

    .codeTag{
      position:absolute;
      top:10px; inset-inline-start:10px;
      background: rgba(4,9,18,.6);
      color:var(--sky-light);
      border:1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 22px rgba(0,0,10,.3);
    }

    .meta{
      padding: 12px 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-top:1px solid var(--border);
    }
    .meta .left{
      display:flex;
      flex-direction:column;
      gap:3px;
      min-width:0;
    }
    .meta .left b{
      font-size: 16px;
      color: var(--ivory);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .meta .left span{
      font-size: 12px;
      color: var(--muted);
    }
    .open{
      text-decoration:none;
      font-weight: 800;
      background: linear-gradient(160deg, rgba(143,214,255,.22), rgba(143,214,255,.08));
      color:#fff;
      border:1px solid rgba(143,214,255,.4);
      padding: 8px 14px;
      border-radius: 12px;
      white-space:nowrap;
      transition: background .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .open:hover{
      background: linear-gradient(160deg, rgba(143,214,255,.35), rgba(143,214,255,.14));
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(143,214,255,.2);
    }

    footer{
      position:relative;
      z-index:2;
      color: var(--muted);
      font-size: 12px;
      padding: 16px 0 30px;
      text-align:center;
      letter-spacing:.4px;
    }

    @media (max-width: 520px){
      .hero{ min-height: 46vh; }
      .heroBody h1{ font-size: 22px; }
      .card{ width: 180px; }
      .backBtn{ bottom:14px; right:14px; }
      .trackWrap{ padding:12px; border-radius:18px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="container">

      <!-- ✅ زر الرجوع إلى Fuji (يفتح الرابط مباشرة) -->
      <button class="backBtn" type="button" aria-label="رجوع"
        onclick="window.location.href='https://fuji.smougroup.com/';">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 6 9 12l6 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="topbar">
        <div class="brand">
          <div class="logo">
            <img src="logo.png" alt="SMOU GROUP" onerror="this.parentElement.style.display='none'">
          </div>
          <div class="text">
            <div class="title">الكبائن الفضية — Silver Cabin</div>
            <div class="sub">SMOU GROUP</div>
          </div>
        </div>

        <div class="pill">
          <div class="search">
            <input id="searchInput" type="search" placeholder="ابحث بالكود... مثال S012" autocomplete="off">
          </div>
          <div class="badge" id="countBadge">—</div>
        </div>
      </div>

      <div class="heroBody">
        <div>
          <h1>معرض الكبائن الفضية</h1>
          <p>اسحب يمين/يسار لتصفح الكبائن. اضغط على الصورة أو زر "فتح" للانتقال إلى رابط العرض.</p>
        </div>
      </div>
    </div>
  </section>

  <main>
    <div class="sliderHeader">
      <div class="h">الكبائن (S001 → S035)</div>
      <div class="controls">
        <button class="btn secondary" id="leftBtn" type="button">◀</button>
        <button class="btn secondary" id="rightBtn" type="button">▶</button>
      </div>
    </div>

    <div class="trackWrap">
      <div class="track" id="track"></div>
    </div>

    <footer>© <span id="year"></span> SMOU GROUP — silver.smougroup.com</footer>
  </main>

  <script>
    const items = [
      {img:"S001.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTQyMTgz"},
      {img:"S002.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTQyMTgy"},
      {img:"S003.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTQyMTg2"},
      {img:"S004.png",href:"https://my.3vfang.com/p/share/content.php?m=a3I4MDM5LWl0ZW09NDYwOTg="},
      {img:"S005.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTQyMTg5"},
      {img:"S006.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTQyMTkw"},
      {img:"S007.png",href:"https://my.3vfang.com/p/share/content.php?m=a3I4MDM5LWl0ZW09NDYxMDE="},
      {img:"S008.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTM1MDcy"},
      {img:"S009.png",href:"https://my.3vfang.com/p/share/content.php?m=bGR5cy1pdGVtPTM1MDcz"},
      {img:"S010.png",href:"https://my.3vfang.com/p/share/content.php?m=a3I4MDM5LWl0ZW09NDU2MzQ="},
      {img:"S011.png",href:"https://my.3vfang.com/p/share/content.php?m=a3I4MDM5LWl0ZW09NDU2MzU="},
      {img:"S012.png",href:"https://www.720yun.com/t/c33jr0wmkk8#scene_id=26482653"},
      {img:"S013.png",href:"https://www.720yun.com/t/2d6jr5swua2#scene_id=26262322"},
      {img:"S014.png",href:"https://www.720yun.com/t/c77jr5swvO7#scene_id=26261605"},
      {img:"S015.png",href:"https://my.3vfang.com/p/pre/kr4693/26825/indexwx.html"},
      {img:"S016.png",href:"https://my.3vfang.com/p/pre/kr4693/26872/indexwx.html"},
      {img:"S017.png",href:"https://www.720yun.com/t/1ebjzgwyev4#scene_id=9454096"},
      {img:"S018.png",href:"https://www.720yun.com/t/4cejzOeOtu1#scene_id=9630448"},
      {img:"S019.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1MzY1"},
      {img:"S020.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1MzY2"},
      {img:"S021.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1MzY5"},
      {img:"S022.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzcy"},
      {img:"S023.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzcz"},
      {img:"S024.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzcw"},
      {img:"S025.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzc0"},
      {img:"S026.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzc2"},
      {img:"S027.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzc3"},
      {img:"S028.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzc4"},
      {img:"S029.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzgx"},
      {img:"S030.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzgy"},
      {img:"S031.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzgw"},
      {img:"S032.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzgz"},
      {img:"S033.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzg1"},
      {img:"S034.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzg2"},
      {img:"S035.png",href:"https://s.3vfang.com/p/share/scontent.php?m=bGR5cy1pdGVtPTU1Mzc4"}
    ];

    const track = document.getElementById("track");
    const searchInput = document.getElementById("searchInput");
    const countBadge = document.getElementById("countBadge");
    document.getElementById("year").textContent = new Date().getFullYear();

    function render(list){
      track.innerHTML = "";
      list.forEach(it=>{
        const code = it.img.replace(".png","");
        const card = document.createElement("div");
        card.className = "card";

        card.addEventListener("click", (e)=>{
          if(e.target.closest("a")) return;
          window.open(it.href, "_blank", "noopener,noreferrer");
        });

        card.innerHTML = `
          <div class="thumb">
            <span class="codeTag">${code}</span>
            <img src="${it.img}" alt="${code}" loading="lazy"
              onerror="this.outerHTML='<div style=\\'padding:16px;color:#d7f1ff;font-weight:700\\'>Image not found: ${code}</div>';">
          </div>
          <div class="meta">
            <div class="left">
              <b>${code}</b>
              <span>اضغط للعرض</span>
            </div>
            <a class="open" href="${it.href}" target="_blank" rel="noopener noreferrer">فتح</a>
          </div>
        `;
        track.appendChild(card);
      });

      countBadge.textContent = `المعروض: ${list.length} / ${items.length}`;
    }

    function filter(){
      const q = (searchInput.value || "").trim().toLowerCase();
      if(!q){ render(items); return; }
      render(items.filter(x => x.img.toLowerCase().includes(q)));
    }
    searchInput.addEventListener("input", filter);

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    function scrollByCards(dir){
      const card = track.querySelector(".card");
      const step = card ? (card.getBoundingClientRect().width + 16) : 260;
      track.scrollBy({ left: dir * step, behavior: "smooth" });
    }
    leftBtn.addEventListener("click", ()=> scrollByCards(1));
    rightBtn.addEventListener("click", ()=> scrollByCards(-1));

    let isDown=false, startX=0, startScroll=0;
    track.addEventListener("mousedown", (e)=>{
      isDown=true;
      track.style.cursor="grabbing";
      startX=e.pageX;
      startScroll=track.scrollLeft;
    });
    window.addEventListener("mouseup", ()=>{
      isDown=false;
      track.style.cursor="grab";
    });
    track.addEventListener("mouseleave", ()=>{
      isDown=false;
      track.style.cursor="grab";
    });
    track.addEventListener("mousemove", (e)=>{
      if(!isDown) return;
      const dx = e.pageX - startX;
      track.scrollLeft = startScroll - dx;
    });
    track.style.cursor="grab";

    render(items);
  </script>
</body>
</html>
